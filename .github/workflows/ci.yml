name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.17"
  OTP_VERSION: "27"

jobs:
  # ---------------------------------------------------------------------------
  # Scope detection: skip heavy jobs on docs-only changes
  # ---------------------------------------------------------------------------
  detect-scope:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    outputs:
      run_tests: ${{ steps.scope.outputs.run_tests }}
      run_dialyzer: ${{ steps.scope.outputs.run_dialyzer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "run_tests=true" >> $GITHUB_OUTPUT
            echo "run_dialyzer=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED" | grep -qE '^(lib/|test/|config/|mix\.(exs|lock)|\.github/)'; then
              echo "run_tests=true" >> $GITHUB_OUTPUT
            else
              echo "run_tests=false" >> $GITHUB_OUTPUT
            fi
            if echo "$CHANGED" | grep -qE '^(lib/|mix\.(exs|lock))'; then
              echo "run_dialyzer=true" >> $GITHUB_OUTPUT
            else
              echo "run_dialyzer=false" >> $GITHUB_OUTPUT
            fi
          fi

  # ---------------------------------------------------------------------------
  # Format + Lint (fast gate)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.run_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

  # ---------------------------------------------------------------------------
  # Unit tests (sharded)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.run_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2]
    env:
      MIX_TEST_PARTITION: ${{ matrix.partition }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Setup database
        run: mix ecto.create && mix ecto.migrate

      - name: Run tests
        run: mix test --partitions 2 --cover

      - name: Upload coverage
        if: matrix.partition == 1
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.partition }}
          path: cover/

  # ---------------------------------------------------------------------------
  # Dialyzer (cached PLTs)
  # ---------------------------------------------------------------------------
  dialyzer:
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.run_dialyzer == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Cache PLTs
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plts-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            plts-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Create PLT directory
        run: mkdir -p priv/plts

      - name: Run Dialyzer
        run: mix dialyzer

  # ---------------------------------------------------------------------------
  # Docker build smoke test
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.run_tests == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t traitee:ci .

      - name: Smoke test
        run: docker run --rm traitee:ci bin/traitee eval "IO.puts(:ok)"

  # ---------------------------------------------------------------------------
  # Windows compatibility check
  # ---------------------------------------------------------------------------
  test-windows:
    runs-on: windows-latest
    needs: detect-scope
    if: needs.detect-scope.outputs.run_tests == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: mix deps.get

      - name: Setup database
        run: |
          mix ecto.create
          mix ecto.migrate

      - name: Run tests (excluding slow)
        run: mix test --exclude slow --exclude integration

  # ---------------------------------------------------------------------------
  # Gate: all checks must pass
  # ---------------------------------------------------------------------------
  ci-pass:
    runs-on: ubuntu-latest
    needs: [lint, test, dialyzer, docker]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] && [ "${{ needs.lint.result }}" != "skipped" ]; then
            echo "lint failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ] && [ "${{ needs.test.result }}" != "skipped" ]; then
            echo "test failed"
            exit 1
          fi
          if [ "${{ needs.dialyzer.result }}" != "success" ] && [ "${{ needs.dialyzer.result }}" != "skipped" ]; then
            echo "dialyzer failed"
            exit 1
          fi
          if [ "${{ needs.docker.result }}" != "success" ] && [ "${{ needs.docker.result }}" != "skipped" ]; then
            echo "docker failed"
            exit 1
          fi
          echo "All checks passed!"
